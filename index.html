<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>来访者记录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f7fa;
      height: 100vh;
      overflow: hidden;
    }

    /* 顶部导航栏 */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .nav-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .nav-btn:active {
      background: rgba(255,255,255,0.3);
    }

    .add-btn-top {
      background: rgba(255,255,255,0.3);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-btn-top:active {
      background: rgba(255,255,255,0.4);
    }

    /* 表格容器 */
    .table-container {
      position: fixed;
      top: 50px;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .schedule-table {
      width: 100%;
      min-width: 700px;
      height: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .schedule-table th.time-col {
      background: #f0f0f0;
      color: #666;
      width: 75px;
      min-width: 75px;
      font-size: 12px;
      font-weight: 500;
    }

    .schedule-table th {
      background: #667eea;
      color: white;
      padding: 8px 4px;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      border: 1px solid #5a6fd6;
    }

    .schedule-table th .date-num {
      font-size: 14px;
      font-weight: bold;
      display: block;
    }

    .schedule-table th .day-name {
      font-size: 11px;
      opacity: 0.9;
    }

    .schedule-table th.today {
      background: #ff6b6b;
      border-color: #e55a5a;
    }

    .schedule-table td {
      border: 1px solid #e0e0e0;
      vertical-align: top;
      padding: 4px;
      height: 50px;
      background: white;
      position: relative;
      overflow: hidden;
    }

    .schedule-cell {
      position: relative;
      min-height: 40px;
    }

    .visitor-card-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 100%;
      overflow-y: auto;
      min-height: 30px;
    }

    .visitor-card-container::-webkit-scrollbar {
      width: 3px;
    }

    .visitor-card-container::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 3px;
    }

    .visitor-card {
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      border-radius: 4px;
      padding: 5px 6px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border-left: 3px solid #667eea;
      font-size: 11px;
      overflow: hidden;
    }

    .visitor-card:active {
      transform: scale(0.98);
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .visitor-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .info-name {
      font-weight: bold;
      font-size: 12px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .info-gender {
      padding: 1px 4px;
      border-radius: 2px;
      font-size: 10px;
      background: rgba(255,255,255,0.6);
      flex-shrink: 0;
    }

    .info-time {
      font-size: 10px;
      color: #555;
      white-space: nowrap;
    }

    .gender-m,
    .gender-f {
      padding: 1px 4px;
      border-radius: 2px;
      font-size: 10px;
      background: rgba(255,255,255,0.6);
      flex-shrink: 0;
    }

    .cell-add-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: none;
      border: none;
      color: #999;
      font-size: 20px;
      font-weight: normal;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s;
      padding: 0;
      width: auto;
      height: auto;
    }

    td:empty .cell-add-btn,
    td:has(.visitor-card-container:empty) .cell-add-btn {
      opacity: 1;
    }

    td:has(.visitor-card) .cell-add-btn {
      opacity: 0;
    }

    .cell-add-btn:hover {
      color: #666;
    }

    /* 模态框 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: stretch;
      justify-content: stretch;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: white;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .modal-header h3 {
      font-size: 18px;
      margin: 0;
      text-align: center;
      flex: 1;
    }

    .modal-back {
      background: none;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      padding: 0;
      white-space: nowrap;
    }

    .modal-header-spacer {
      width: 60px;
    }

    .modal-body {
      padding: 12px 16px;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .gender-form .gender-group {
      flex-direction: column;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #333;
      font-weight: 500;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .gender-group {
      display: flex;
      gap: 16px;
    }

    .gender-option {
      flex: 1;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .gender-option.active {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.1);
    }

    .gender-option input {
      display: none;
    }

    /* 时间选择器 */
    .time-picker-container {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .time-picker {
      flex: 1;
      max-width: 100px;
      height: 108px;
      position: relative;
      overflow: hidden;
    }

    .time-picker-scroll {
      height: 100%;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: y proximity;
    }

    .time-picker-scroll::-webkit-scrollbar {
      display: none;
    }

    .time-option {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      scroll-snap-align: center;
      cursor: pointer;
      transition: background 0.15s;
    }

    .time-option.selected {
      background: #667eea;
      color: white;
      border-radius: 6px;
    }

    .time-picker-label {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 36px;
      transform: translateY(-50%);
      border-top: 2px solid #667eea;
      border-bottom: 2px solid #667eea;
      pointer-events: none;
      z-index: 10;
    }

    .time-spacer {
      height: 36px;
    }

    .modal-footer {
      padding: 16px;
      display: flex;
      gap: 10px;
      border-top: 1px solid #eee;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:active {
      opacity: 0.8;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-danger {
      background: #ff4757;
      color: white;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <div class="header">
    <button class="nav-btn" onclick="changeWeek(-1)">上周</button>
    <button class="add-btn-top" onclick="openAddModalForWeek()">添加来访</button>
    <button class="nav-btn" onclick="changeWeek(1)">下周</button>
  </div>

  <!-- 表格 -->
  <div class="table-container">
    <table class="schedule-table">
      <thead>
        <tr>
          <th class="time-col">时间</th>
          <th id="day0">周一</th>
          <th id="day1">周二</th>
          <th id="day2">周三</th>
          <th id="day3">周四</th>
          <th id="day4">周五</th>
          <th id="day5">周六</th>
          <th id="day6">周日</th>
        </tr>
      </thead>
      <tbody id="scheduleBody">
      </tbody>
    </table>
  </div>

  <!-- 添加/编辑模态框 -->
  <div class="modal-overlay" id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <button class="modal-back" onclick="closeModal()">&#8249; 返回</button>
        <h3 id="modalTitle">添加来访者</h3>
        <div class="modal-header-spacer"></div>
      </div>
      <div class="modal-body">
        <form id="visitorForm">
          <input type="hidden" id="visitorId">

          <div class="form-row">
            <div class="form-group">
              <label>姓名 *</label>
              <input type="text" id="name" required placeholder="请输入姓名">
            </div>

            <div class="form-group gender-form">
              <label>性别</label>
              <div class="gender-group">
                <label class="gender-option" id="genderMLabel" onclick="selectGender('男')">
                  <input type="radio" name="gender" value="男">
                  <span>男</span>
                </label>
                <label class="gender-option active" id="genderFLabel" onclick="selectGender('女')">
                  <input type="radio" name="gender" value="女" checked>
                  <span>女</span>
                </label>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>联系电话</label>
            <input type="tel" id="phone" placeholder="请输入联系电话">
          </div>

          <div class="form-group">
            <label>日期 *</label>
            <input type="date" id="date" required>
          </div>

          <div class="form-group">
            <label>时间 *</label>
            <div class="time-picker-container">
              <div class="time-picker">
                <div class="time-picker-label"></div>
                <div class="time-picker-scroll" id="hourPicker">
                  <!-- 小时选项将通过JS生成 -->
                </div>
              </div>
              <div class="time-picker">
                <div class="time-picker-label"></div>
                <div class="time-picker-scroll" id="minutePicker">
                  <!-- 分钟选项将通过JS生成 -->
                </div>
              </div>
            </div>
            <input type="hidden" id="startTime">
          </div>

          <div class="form-group">
            <label>结束时间（自动计算：开始时间+50分钟）</label>
            <div id="endTimeDisplay" style="background: #f5f5f5; padding: 10px 12px; border-radius: 8px; text-align: center; font-size: 18px; color: #666;">--:--</div>
            <input type="hidden" id="endTime">
          </div>

          <div class="form-group">
            <label>备注</label>
            <textarea id="notes" rows="2" placeholder="可选备注信息"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="deleteBtn" style="display:none;" onclick="deleteVisitor()">删除</button>
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveVisitor()">保存</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
